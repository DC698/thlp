<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#326E6A;--teal-mid:#274f4c;--teal-light:#3d8a85;--teal-pale:rgba(50,110,106,.08);
  --gold:#C8A951;--gold-pale:#FFF8E7;--gold-dark:#8B6800;
  --purple:#7B4F9E;--purple-pale:#F3EEF9;
  --white:#fff;--offwhite:#f4f7f7;--gray:#e2e8e8;--text:#1a2424;--muted:#5a7070;
  --shadow:0 4px 24px rgba(50,110,106,.13);--shadow-lg:0 12px 48px rgba(50,110,106,.18);
  --green:#1e6e3a;--green-bg:#e6f4ea;--green-border:#a8d5b5;
  --red:#b91c1c;
}
body{font-family:'Source Sans 3',sans-serif;background:var(--offwhite);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 0% 0%,rgba(50,110,106,.06) 0%,transparent 60%);pointer-events:none;z-index:0}

/* HEADER */
header{background:var(--teal);border-bottom:4px solid var(--gold);padding:18px 32px;display:flex;align-items:center;gap:18px;position:relative;z-index:1}
.logo-badge{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-weight:700;font-size:15px;color:#fff;flex-shrink:0}
.header-text h1{font-family:'Libre Baskerville',serif;color:#fff;font-size:18px}
.header-text p{color:rgba(255,255,255,.7);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.badge-pill{background:var(--gold);color:#1F3B3A;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 14px;border-radius:20px}

main{max-width:900px;margin:32px auto 60px;padding:0 20px;position:relative;z-index:1}

/* STAFF SELECTOR */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:12px;margin-bottom:28px}
.staff-card{background:#fff;border:2px solid var(--gray);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;user-select:none}
.staff-card:hover{border-color:var(--teal);box-shadow:var(--shadow);transform:translateY(-2px)}
.staff-card.active{border-color:var(--teal);background:var(--teal-pale)}
.staff-avatar{width:38px;height:38px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-weight:700;font-size:14px;flex-shrink:0}
.staff-card.active .staff-avatar{background:var(--teal-mid)}
.staff-info-name{font-size:13px;font-weight:700;color:var(--teal);line-height:1.3}
.staff-info-title{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4}

/* PAR FORM */
.par-wrap{display:none;animation:fadeUp .35s ease both}
.par-wrap.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.par-card{background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);overflow:hidden;margin-bottom:20px}
.par-card-header{background:linear-gradient(135deg,var(--teal) 0%,var(--teal-light) 100%);padding:22px 28px;border-bottom:3px solid var(--gold)}
.par-card-header h2{font-family:'Libre Baskerville',serif;color:#fff;font-size:19px;margin-bottom:3px}
.par-card-header .sub{color:rgba(255,255,255,.75);font-size:12px;line-height:1.5}
.chip-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:12px}

.par-body{padding:24px 28px}

/* EMPLOYEE INFO BOX */
.emp-info-box{background:var(--offwhite);border:1px solid var(--gray);border-radius:10px;padding:16px 18px;margin-bottom:22px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:500px){.emp-info-box{grid-template-columns:1fr}}
.emp-info-row{display:flex;flex-direction:column;gap:2px}
.emp-info-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.emp-info-value{font-size:13px;font-weight:700;color:var(--teal)}

/* PERIOD SECTION */
.period-section{margin-bottom:24px}
.period-title{font-family:'Libre Baskerville',serif;font-size:14px;color:var(--teal);padding:10px 14px;background:var(--teal-pale);border-left:4px solid var(--teal);border-radius:0 8px 8px 0;margin-bottom:14px;font-weight:700}

/* ALLOCATION TABLE */
.alloc-table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:13px}
.alloc-table thead tr{background:var(--teal)}
.alloc-table thead th{color:#fff;padding:9px 12px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.alloc-table thead th.center{text-align:center}
.alloc-table tbody tr:nth-child(even){background:var(--offwhite)}
.alloc-table tbody tr.total-row{background:var(--teal-pale);font-weight:700}
.alloc-table tbody td{padding:9px 12px;border-bottom:1px solid var(--gray)}
.alloc-table tbody td.center{text-align:center}
.grant-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:7px;flex-shrink:0}
.dot-hvrp{background:var(--teal)}
.dot-gpd{background:var(--gold)}
.dot-sp{background:var(--purple)}
.pct-badge{font-weight:700;color:var(--teal)}
.initials-input{border:1px solid var(--gray);border-radius:5px;padding:5px 10px;font-family:'Source Sans 3',sans-serif;font-size:12px;width:80px;text-align:center;outline:none;transition:border-color .2s}
.initials-input:focus{border-color:var(--teal)}

/* CERTIFICATION */
.cert-box{background:var(--gold-pale);border:1px solid var(--gold);border-radius:8px;padding:12px 16px;font-size:12px;color:#5a4a00;line-height:1.7;margin-bottom:16px}
.cert-box strong{color:var(--gold-dark)}

/* SIGNATURE GRID */
.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:8px}
@media(max-width:500px){.sig-grid{grid-template-columns:1fr}}
.sig-box{border:2px solid var(--gray);border-radius:10px;padding:13px;background:var(--offwhite)}
.sig-box-title{font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.sig-canvas-wrap{position:relative;background:#fff;border:1px solid var(--gray);border-radius:6px;overflow:hidden;margin-bottom:6px}
canvas{display:block;width:100%;touch-action:none}
.sig-controls{display:flex;align-items:center;justify-content:space-between}
.sig-clear{background:none;border:1px solid var(--gray);border-radius:5px;padding:4px 10px;font-family:'Source Sans 3',sans-serif;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer}
.sig-clear:hover{border-color:var(--teal);color:var(--teal)}
.sig-date{font-size:10px;color:var(--muted)}

/* DIVIDER */
.period-divider{border:none;border-top:2px dashed var(--gray);margin:22px 0}

/* PRINT STYLES */
@media print{
  body{background:#fff!important}
  header{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .staff-grid,.par-actions,.sig-clear{display:none!important}
  .par-wrap{display:block!important}
  .par-card{box-shadow:none!important;break-inside:avoid}
  .print-filename-banner{display:block!important}
  .period-section{page-break-inside:avoid}
}
.print-filename-banner{display:none;background:var(--teal);color:#fff;padding:8px 28px;font-size:12px;font-weight:700;font-family:'Source Sans 3',sans-serif}

/* ACTIONS */
.par-actions{padding:18px 28px;border-top:1px solid var(--gray);background:var(--offwhite);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.par-note{font-size:11px;color:var(--muted);line-height:1.5;max-width:360px}
.par-note strong{color:var(--teal)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.print-btn{background:var(--offwhite);color:var(--teal);border:2px solid var(--teal);border-radius:9px;padding:10px 20px;font-family:'Source Sans 3',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.print-btn:hover{background:var(--teal-pale)}
.save-btn{background:var(--teal);color:#fff;border:none;border-radius:9px;padding:10px 24px;font-family:'Source Sans 3',sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(50,110,106,.25);transition:all .2s}
.save-btn:hover{background:var(--teal-mid);transform:translateY(-1px)}

/* SUCCESS */
.success-msg{display:none;background:var(--green-bg);border:1px solid var(--green-border);border-radius:10px;padding:20px;text-align:center;margin:0 28px 24px;animation:fadeUp .3s ease}
.success-msg .si{font-size:28px;margin-bottom:8px}
.success-msg h3{font-family:'Libre Baskerville',serif;font-size:15px;color:var(--green);margin-bottom:4px}
.success-msg p{font-size:12px;color:var(--muted)}
.success-msg .save-pdf-btn{background:var(--teal);color:#fff;border:none;border-radius:7px;padding:9px 20px;font-family:'Source Sans 3',sans-serif;font-size:12px;font-weight:700;cursor:pointer;margin-top:12px}
.success-msg .fn-display{font-family:monospace;background:var(--teal);color:#fff;padding:3px 9px;border-radius:5px;font-size:11px;display:inline-block;margin:5px 0}
</style>
</head>

          <span class="fn-display" id="fn-${s.id}"></span>
        </div>
        <div class="par-actions" id="actions-${s.id}">
          <div class="par-note">
            <strong>Retention Required:</strong> Completed PARs must be signed by both employee and supervisor and retained for 3 years after grant close per 2 CFR §200.334.
          </div>
          <div class="btn-row">
            <button class="print-btn" onclick="window.print()">🖨️ Print</button>
            <button class="save-btn" onclick="certifyPAR('${s.id}')">✅ Certify &amp; Save PDF</button>
          </div>
        </div>
      </div>`;

    container.appendChild(wrap);
  });
}

// ── SELECT STAFF ──
function selectStaff(id, card){
  document.querySelectorAll('.staff-card').forEach(c=>c.classList.remove('active'));
  card.classList.add('active');
  document.querySelectorAll('.par-wrap').forEach(w=>w.classList.remove('active'));
  document.getElementById('par-'+id).classList.add('active');
  document.getElementById('par-'+id).scrollIntoView({behavior:'smooth',block:'start'});
  // Init canvases for this staff member
  initStaffCanvases(id);
}

// ── CANVAS MANAGEMENT ──
const initedCanvases = new Set();
function initStaffCanvases(staffId){
  const s = staff.find(x=>x.id===staffId);
  s.periods.forEach((p,pi)=>{
    ['emp','sup'].forEach(role=>{
      const key = `${staffId}-p${pi}-${role}`;
      if(initedCanvases.has(key)) return;
      initedCanvases.add(key);
      initCanvas(`sig-${key}`, `ph-${key}`, `sd-${key}`);
    });
  });
}

function initCanvas(canvasId, phId, dateId){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let drawing = false, hasSig = false;
  function resize(){
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = 90;
    ctx.strokeStyle = '#1a2424';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }
  resize();
  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width/rect.width, sy = canvas.height/rect.height;
    if(e.touches) return {x:(e.touches[0].clientX-rect.left)*sx, y:(e.touches[0].clientY-rect.top)*sy};
    return {x:(e.clientX-rect.left)*sx, y:(e.clientY-rect.top)*sy};
  }
  function start(e){
    e.preventDefault(); drawing=true; hasSig=true;
    const p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y);
    document.getElementById(phId).style.display='none';
    document.getElementById(dateId).textContent = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }
  function draw(e){ if(!drawing)return; e.preventDefault(); const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); }
  function end(){ drawing=false; }
  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',draw);
  canvas.addEventListener('mouseup',end);
  canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',start,{passive:false});
  canvas.addEventListener('touchmove',draw,{passive:false});
  canvas.addEventListener('touchend',end);
  canvas._hasSig = ()=>hasSig;
  canvas._reset = ()=>{hasSig=false;};
  window.addEventListener('resize',()=>resize());
}

function clearSig(staffId, period, role){
  const key = `${staffId}-${period}-${role}`;
  const canvas = document.getElementById('sig-'+key);
  if(!canvas) return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
  canvas._reset();
  document.getElementById('ph-'+key).style.display='block';
  document.getElementById('sd-'+key).textContent='';
}

// ── CERTIFY & SAVE ──
function certifyPAR(staffId){
  const s = staff.find(x=>x.id===staffId);
  const fileName = `${s.name.replace(/\s+/g,'_')}_PAR_PY2025-2026.pdf`;
  document.getElementById('fn-'+staffId).textContent = fileName;
  document.getElementById('actions-'+staffId).style.display='none';
  document.getElementById('success-'+staffId).style.display='block';
  document.getElementById('success-'+staffId).scrollIntoView({behavior:'smooth',block:'center'});
  setTimeout(()=>triggerPrint(staffId), 500);
}

function triggerPrint(staffId){
  const s = staff.find(x=>x.id===staffId);
  const fileName = `${s.name.replace(/\s+/g,'_')}_PAR_PY2025-2026.pdf`;
  const banner = document.getElementById('filenameBanner');
  if(banner){ banner.textContent='📄 Save as: '+fileName; banner.style.display='block'; }
  document.getElementById('fn-'+staffId).textContent = fileName;
  document.title = fileName;
  setTimeout(()=>window.print(), 350);
}

buildPARForms();

initStaffCanvases('felicia');
